<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universo Elétrico — Painel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.page{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.screen{display:none;flex-direction:column;gap:16px;animation:fadeIn .2s ease}
.screen.on{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pg-head{margin-bottom:4px}
.pg-label{font-size:11px;font-weight:600;color:#9DAEC4;letter-spacing:.7px;text-transform:uppercase;margin-bottom:3px}
.pg-title{font-size:22px;font-weight:700;color:#111827;letter-spacing:-.4px}
.pg-sub{font-size:13px;color:#8A9BB5;margin-top:3px}
.bc{display:flex;align-items:center;gap:5px;font-size:12px}
.bc-item{color:#9DAEC4;cursor:pointer;font-weight:500;transition:color .15s}
.bc-item:hover{color:#1B3FAB}
.bc-item.cur{color:#1B3FAB;font-weight:600;pointer-events:none}
.bc-sep{color:#D0DBF5;font-size:12px}

/* teams */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.team-card{background:#fff;border-radius:16px;border:1px solid #EAF0FB;padding:18px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;display:flex;flex-direction:column;gap:12px}
.team-card:hover{transform:translateY(-2px);border-color:#A8C0F0;box-shadow:0 6px 20px rgba(27,63,171,.1)}
.tc-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px}
.tc-name{font-size:14px;font-weight:700;color:#111827}
.tc-count{font-size:11px;color:#9CA3AF;margin-top:1px}
.tc-gestor{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:#F8FAFF;border:1px solid #EAF0FB}
.tc-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.tc-gname{font-size:12px;font-weight:600;color:#374151}
.tc-grole{font-size:10px;color:#9CA3AF}
.tc-foot{display:flex;align-items:center;justify-content:space-between}
.tc-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:#EEF3FF;color:#1B3FAB}
.tc-foot i{font-size:15px;color:#C4D0E8;transition:transform .2s,color .2s}
.team-card:hover .tc-foot i{transform:translateX(3px);color:#1B3FAB}

/* team banner */
.team-banner{background:#fff;border-radius:14px;border:1px solid #EAF0FB;padding:16px 20px;display:flex;align-items:center;gap:14px}
.tb-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.tb-name{font-size:16px;font-weight:700;color:#111827}
.tb-sub{font-size:12px;color:#8A9BB5;margin-top:2px}
.tb-pill{margin-left:auto;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;background:#EEF3FF;color:#1B3FAB;flex-shrink:0}

/* vendedores */
.vend-list{display:flex;flex-direction:column;gap:8px}
.vc{background:#fff;border-radius:13px;border:1px solid #EAF0FB;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.vc:hover{border-color:#C7D7FF}
.vc-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.vc-name{font-size:14px;font-weight:700;color:#111827}
.vc-role{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:3px}
.vc-pend{font-size:10px;font-weight:600;background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:20px;margin-left:6px}
.vc-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}

/* preview card */
.preview-card{background:#fff;border-radius:16px;border:1px solid #EAF0FB;padding:40px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center}
.prev-av{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff}
.link-row{display:flex;align-items:center;gap:10px;background:#F8FAFF;border:1px solid #E0E8FF;border-radius:12px;padding:12px 16px;width:100%;max-width:520px}
.link-row i{font-size:16px;color:#6B8ADE;flex-shrink:0}
.link-url{font-size:12px;color:#6B8ADE;font-family:monospace;flex:1;word-break:break-all;text-align:left}
.back-btn{width:36px;height:36px;border-radius:10px;background:#fff;border:1px solid #EAF0FB;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6B7C99;transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:#C7D7FF;color:#1B3FAB;background:#F5F8FF}

@media(max-width:640px){.vc-actions{flex-direction:column;gap:5px}.teams-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="topbar">
  <a class="logo" href="/"><div class="logo-bolt"><i class="ti ti-bolt"></i></div><div><div class="logo-top">Universo</div><div class="logo-bot">Elétrico</div></div></a>
  <div class="bc" id="bc"></div>
</div>
<div class="page">
  <!-- equipes -->
  <div class="screen on" id="s-equipes">
    <div class="pg-head"><div class="pg-label">Gestão</div><div class="pg-title">Equipes &amp; Gestores</div><div class="pg-sub">Clique em uma equipe para ver os vendedores</div></div>
    <div class="teams-grid" id="teams-grid"></div>
  </div>
  <!-- vendedores -->
  <div class="screen" id="s-vendedores">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="back-btn" onclick="go('equipes')"><i class="ti ti-arrow-left"></i></button>
      <div><div class="pg-label">Equipe</div><div class="pg-title" id="v-title">—</div></div>
    </div>
    <div class="team-banner" id="team-banner"></div>
    <div class="vend-list" id="vend-list"></div>
  </div>
  <!-- preview -->
  <div class="screen" id="s-preview">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="back-btn" id="prev-back"><i class="ti ti-arrow-left"></i></button>
      <div><div class="pg-label">Links do vendedor</div><div class="pg-title" id="prev-title">—</div></div>
    </div>
    <div class="preview-card">
      <div class="prev-av" id="prev-av"></div>
      <div><div style="font-size:19px;font-weight:700;color:#111827" id="prev-name">—</div>
        <div style="font-size:13px;color:#8A9BB5;margin-top:3px" id="prev-sub">—</div></div>
      <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:520px">
        <div style="font-size:11px;font-weight:600;color:#9DAEC4;text-transform:uppercase;letter-spacing:.5px">Formulário de cadastro</div>
        <div class="link-row"><i class="ti ti-forms"></i><span class="link-url" id="prev-form-url"></span>
          <button class="btn btn-copy btn-sm" id="prev-copy-form" onclick="copyLink('prev-form-url','prev-copy-form')"><i class="ti ti-copy"></i> Copiar</button></div>
        <div style="font-size:11px;font-weight:600;color:#9DAEC4;text-transform:uppercase;letter-spacing:.5px;margin-top:4px">Portal do Consultor</div>
        <div class="link-row"><i class="ti ti-list-check"></i><span class="link-url" id="prev-acomp-url"></span>
          <button class="btn btn-copy btn-sm" id="prev-copy-acomp" onclick="copyLink('prev-acomp-url','prev-copy-acomp')"><i class="ti ti-copy"></i> Copiar</button></div>
        <div style="font-size:11px;font-weight:600;color:#9DAEC4;text-transform:uppercase;letter-spacing:.5px;margin-top:4px">Pagamentos</div>
        <div class="link-row"><i class="ti ti-cash"></i><span class="link-url" id="prev-pag-url"></span>
          <button class="btn btn-copy btn-sm" id="prev-copy-pag" onclick="copyLink('prev-pag-url','prev-copy-pag')"><i class="ti ti-copy"></i> Copiar</button></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <a class="btn btn-ghost" id="prev-open-form" href="#" target="_blank"><i class="ti ti-external-link"></i> Abrir formulário</a>
        <a class="btn btn-ghost" id="prev-open-acomp" href="#" target="_blank"><i class="ti ti-chart-bar"></i> Abrir portal</a>
        <a class="btn btn-primary" id="prev-open-pag" href="#" target="_blank"><i class="ti ti-cash"></i> Financeiro</a>
      </div>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
let curTeam = null;

window.addEventListener('DOMContentLoaded', () => { renderTeams(); bc('equipes'); });

function renderTeams() {
  document.getElementById('teams-grid').innerHTML = TEAMS.map(t => {
    const g = PESSOAS.find(p => p.team===t.id);
    const n = PESSOAS.filter(p => p.team===t.id).length;
    return `<div class="team-card" onclick="openTeam('${t.id}')">
      <div class="tc-icon" style="background:${t.bg}"><i class="ti ${t.icon}" style="color:${t.color}"></i></div>
      <div><div class="tc-name">${t.name}</div><div class="tc-count">${n} membros</div></div>
      ${g?`<div class="tc-gestor"><div class="tc-av" style="background:${t.color}">${g.ini}</div>
        <div><div class="tc-gname">${g.name}</div><div class="tc-grole">${g.role}</div></div></div>`:''}
      <div class="tc-foot"><span class="tc-pill">Ver vendedores</span><i class="ti ti-arrow-right"></i></div>
    </div>`;
  }).join('');
}

async function openTeam(id) {
  curTeam = id;
  const t = getTeam(id);
  const membros = PESSOAS.filter(p => p.team===id);
  const g = membros.find(p => p.role.includes('Gestor'));
  document.getElementById('v-title').textContent = t.name;
  document.getElementById('team-banner').innerHTML = `
    <div class="tb-icon" style="background:${t.bg}"><i class="ti ${t.icon}" style="color:${t.color};font-size:22px"></i></div>
    <div><div class="tb-name">${t.name}</div><div class="tb-sub">Gestor(a): ${g?g.name:'—'}</div></div>
    <div class="tb-pill">${membros.length} membros</div>`;
  // busca pendentes de cada vendedor
  const rows = await Promise.all(membros.map(async p => {
    let pend=0;
    try{const r=await fetch(`${API}/api/stats/${slugify(p.name)}`);const j=await r.json();if(j.ok)pend=j.data.pendente;}catch(e){}
    return {p,pend};
  }));
  document.getElementById('vend-list').innerHTML = rows.map(({p,pend}) => {
    const sl=slugify(p.name);
    return `<div class="vc">
      <div class="vc-av" style="background:${t.color}">${p.ini}</div>
      <div style="flex:1;min-width:0">
        <div class="vc-name">${p.name}${pend>0?`<span class="vc-pend">${pend} pendente${pend>1?'s':''}</span>`:''}</div>
        <span class="vc-role" style="background:${t.bg};color:${t.color}">${p.role}</span>
      </div>
      <div class="vc-actions">
        <button class="btn btn-copy btn-sm" id="cp-${sl}" onclick="copyVend('${sl}')"><i class="ti ti-copy"></i> Copiar link</button>
        <button class="btn btn-primary btn-sm" onclick="openPreview('${sl}')"><i class="ti ti-link"></i> Links</button>
      </div>
    </div>`;
  }).join('');
  go('vendedores'); bc('vendedores');
}

function openPreview(sl) {
  const p = getPessoa(sl);
  if (!p) return;
  const t = getTeam(p.team);
  const fl = formLink(p), al = acompLink(p);
  const pl = location.origin+'/pagamento.html?v='+sl+'&t='+p.team;
  document.getElementById('prev-title').textContent = p.name;
  document.getElementById('prev-name').textContent  = p.name;
  document.getElementById('prev-sub').textContent   = t.name+' · '+p.role;
  document.getElementById('prev-av').textContent    = p.ini;
  document.getElementById('prev-av').style.background = t.color;
  document.getElementById('prev-form-url').textContent  = fl;
  document.getElementById('prev-acomp-url').textContent = al;
  document.getElementById('prev-open-form').href  = fl;
  document.getElementById('prev-open-acomp').href = al;
  document.getElementById('prev-pag-url').textContent   = pl;
  document.getElementById('prev-open-pag').href   = pl;
  document.getElementById('prev-back').onclick = ()=>{go('vendedores');bc('vendedores');};
  ['prev-copy-form','prev-copy-acomp','prev-copy-pag'].forEach(id=>{const b=document.getElementById(id);b.innerHTML='<i class="ti ti-copy"></i> Copiar';b.classList.remove('ok');});
  go('preview'); bc('preview', p.name);
}

function copyVend(sl) {
  const p = getPessoa(sl);
  if(!p) return;
  navigator.clipboard.writeText(formLink(p)).then(()=>{
    const b=document.getElementById('cp-'+sl);
    if(b){b.innerHTML='<i class="ti ti-check"></i> Copiado!';b.classList.add('ok');setTimeout(()=>{b.innerHTML='<i class="ti ti-copy"></i> Copiar link';b.classList.remove('ok');},2000);}
  });
}

function copyLink(urlId, btnId) {
  const url = document.getElementById(urlId)?.textContent||'';
  navigator.clipboard.writeText(url).then(()=>{
    const b=document.getElementById(btnId);
    if(b){b.innerHTML='<i class="ti ti-check"></i> Copiado!';b.classList.add('ok');setTimeout(()=>{b.innerHTML='<i class="ti ti-copy"></i> Copiar';b.classList.remove('ok');},2000);}
  });
}

function go(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));document.getElementById('s-'+s).classList.add('on');}

function bc(s,label=''){
  const el=document.getElementById('bc');
  const t=curTeam?getTeam(curTeam):null;
  if(s==='equipes')      el.innerHTML=`<span class="bc-item cur">Equipes</span>`;
  else if(s==='vendedores') el.innerHTML=`<span class="bc-item" onclick="go('equipes');bc('equipes')">Equipes</span><i class="ti ti-chevron-right bc-sep"></i><span class="bc-item cur">${t?t.name:''}</span>`;
  else if(s==='preview')    el.innerHTML=`<span class="bc-item" onclick="go('equipes');bc('equipes')">Equipes</span><i class="ti ti-chevron-right bc-sep"></i><span class="bc-item" onclick="openTeam('${curTeam}')">${t?t.name:''}</span><i class="ti ti-chevron-right bc-sep"></i><span class="bc-item cur">${label}</span>`;
}
</script>
</body>
</html>
