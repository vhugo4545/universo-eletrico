<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Universo Elétrico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
:root{--blue:#1B3FAB;--red:#E53012;--white:#fff;--bg:#F0F4FF;--bd:#EAF0FB;--text:#111827;--sec:#374151;--muted:#9DAEC4;--r:14px;--sh:0 1px 4px rgba(27,63,171,.07)}
body{background:var(--bg);min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif}
.wrap{max-width:1400px;margin:0 auto;padding:24px 20px}

/* ── HEADER ── */
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.dash-title{font-size:22px;font-weight:800;color:var(--text)}
.dash-sub{font-size:13px;color:var(--muted);margin-top:2px}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filt-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--white);color:var(--muted);font-family:inherit;transition:all .2s}
.filt-btn:hover{border-color:#C7D7FF;color:var(--blue)}
.filt-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;border:1.5px solid var(--bd);background:var(--white);color:var(--sec);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue)}
.refresh-btn i{font-size:14px}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);padding:16px 18px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.kpi.blue::after{background:var(--blue)}
.kpi.green::after{background:#16A34A}
.kpi.yellow::after{background:#D97706}
.kpi.red::after{background:#DC2626}
.kpi.purple::after{background:#7C3AED}
.kpi.cyan::after{background:#0891B2}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:28px;font-weight:800;color:var(--text);line-height:1.1}
.kpi-sub{font-size:11px;color:var(--muted)}
.kpi-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:32px;opacity:.08}

/* ── SECTION GRID ── */
.sec-row{display:grid;gap:16px;margin-bottom:16px}
.sec-row.col2{grid-template-columns:1fr 1fr}
.sec-row.col3{grid-template-columns:1fr 1fr 1fr}
.sec-row.col13{grid-template-columns:1fr 2.5fr}
.sec-row.col31{grid-template-columns:2.5fr 1fr}
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);padding:20px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.card-title i{font-size:16px;color:var(--blue)}

/* ── PIPELINE FUNNEL ── */
.funnel{display:flex;flex-direction:column;gap:6px}
.funnel-step{display:flex;align-items:center;gap:10px}
.funnel-bar-wrap{flex:1;height:34px;background:#F3F4F6;border-radius:8px;overflow:hidden;position:relative}
.funnel-bar{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:#fff;transition:width .6s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.funnel-label{font-size:11px;font-weight:600;color:var(--sec);width:120px;flex-shrink:0;text-align:right}
.funnel-count{font-size:12px;font-weight:800;color:var(--text);width:36px;text-align:right;flex-shrink:0}

/* ── DONUT CHART ── */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;color:var(--sec)}
.legend-val{font-weight:700;color:var(--text)}
.legend-pct{color:var(--muted);font-size:11px}

/* ── BAR CHART ── */
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-name{font-size:11px;color:var(--sec);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:#F3F4F6;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;transition:width .6s cubic-bezier(.4,0,.2,1);min-width:28px}
.bar-num{font-size:11px;font-weight:700;color:var(--text);width:28px;text-align:right;flex-shrink:0}

/* ── LINE CHART ── */
.timeline-wrap{overflow-x:auto}
.timeline-wrap svg{display:block}

/* ── RANKING TABLE ── */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;text-align:left;border-bottom:1.5px solid var(--bd)}
.rank-table td{padding:10px 10px;font-size:12px;color:var(--sec);border-bottom:1px solid #F9FAFB;vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:#F8FAFF}
.rank-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.rank-name{font-weight:600;color:var(--text)}
.mini-bar-wrap{height:6px;background:#F3F4F6;border-radius:3px;overflow:hidden;margin-top:3px}
.mini-bar{height:100%;border-radius:3px}
.badge-sm{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}

/* ── TIPO CARDS ── */
.tipo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tipo-card{border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:4px}
.tipo-card-num{font-size:24px;font-weight:800;line-height:1}
.tipo-card-lbl{font-size:11px;font-weight:600;opacity:.75}

/* ── RECENT TABLE ── */
.recent-table{width:100%;border-collapse:collapse}
.recent-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:left;border-bottom:1.5px solid var(--bd)}
.recent-table td{padding:10px 12px;font-size:12px;color:var(--sec);border-bottom:1px solid #F9FAFB;vertical-align:middle}
.recent-table tr:last-child td{border-bottom:none}
.recent-table tr:hover td{background:#F8FAFF}
.mono{font-family:monospace;font-size:11px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}

/* ── STAT MINI ── */
.stat-mini{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px;background:#F8FAFF;border-radius:10px;border:1px solid var(--bd)}
.stat-mini-val{font-size:20px;font-weight:800;color:var(--text)}
.stat-mini-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;text-align:center}
.stat-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── LOADING ── */
.loading-dash{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--muted)}
.loading-dash i{font-size:36px;animation:spin .8s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .sec-row.col2,.sec-row.col3,.sec-row.col13,.sec-row.col31{grid-template-columns:1fr}
}
@media(max-width:500px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="/admin.html">
    <div class="logo-bolt"><i class="ti ti-bolt"></i></div>
    <div><div class="logo-top">Universo</div><div class="logo-bot">Elétrico</div></div>
  </a>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/admin.html" class="btn btn-ghost btn-sm"><i class="ti ti-layout-sidebar"></i> Admin</a>
    <a href="/admin-cadastro.html" class="btn btn-ghost btn-sm"><i class="ti ti-clipboard-list"></i> Cadastro</a>
    <a href="/admin-fiscal.html" class="btn btn-ghost btn-sm"><i class="ti ti-file-invoice"></i> Fiscal</a>
  </div>
</div>

<div class="wrap">
  <div class="dash-header">
    <div>
      <div class="dash-title"><i class="ti ti-chart-bar" style="color:var(--blue)"></i> Dashboard de Performance</div>
      <div class="dash-sub" id="dash-sub">Carregando dados...</div>
    </div>
    <div class="filter-row">
      <button class="filt-btn" onclick="setRange('today')">Hoje</button>
      <button class="filt-btn" onclick="setRange('7d')">7 dias</button>
      <button class="filt-btn" onclick="setRange('30d')">30 dias</button>
      <button class="filt-btn on" id="btn-all" onclick="setRange('all')">Tudo</button>
      <button class="refresh-btn" onclick="carregar()"><i class="ti ti-refresh"></i> Atualizar</button>
    </div>
  </div>

  <div id="dash-content">
    <div class="loading-dash"><i class="ti ti-loader-2"></i><div>Carregando dashboard...</div></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
let todos = [], pagamentos = [], rangeAtual = 'all';

const STATUS_CFG = {
  preenchido:    {label:'Preenchido',      color:'#D97706', bg:'#FEF3C7'},
  'lib-cadastro':{label:'Lib. Cadastro',   color:'#1B3FAB', bg:'#EEF3FF'},
  'lib-sistema': {label:'Aprov. Crédito',  color:'#0891B2', bg:'#ECFEFF'},
  'lib-fiscal':  {label:'Lib. Fiscal',     color:'#7C3AED', bg:'#F5F3FF'},
  cadastrado:    {label:'Cadastrado',      color:'#16A34A', bg:'#DCFCE7'},
  revisao:       {label:'Em Revisão',      color:'#DC2626', bg:'#FEF2F2'},
};
const PIPELINE_ORDER = ['preenchido','lib-cadastro','lib-sistema','lib-fiscal','cadastrado'];

async function carregar() {
  document.getElementById('dash-content').innerHTML =
    '<div class="loading-dash"><i class="ti ti-loader-2"></i><div>Carregando dados...</div></div>';
  try {
    const [r1, r2] = await Promise.all([
      fetch(`${API}/api/cadastros`),
      fetch(`${API}/api/pagamentos`).catch(() => ({ json: () => ({ ok:true, data:[] }) }))
    ]);
    const j1 = await r1.json();
    const j2 = await r2.json().catch(() => ({ ok:true, data:[] }));
    todos      = j1.data || [];
    pagamentos = j2.data || [];
    renderDash();
  } catch(e) {
    document.getElementById('dash-content').innerHTML =
      `<div class="loading-dash"><i class="ti ti-alert-circle" style="color:#DC2626;animation:none"></i><div>Erro ao carregar: ${e.message}</div></div>`;
  }
}

function filtrar() {
  const now = Date.now();
  const cortes = { today: 86400000, '7d': 7*86400000, '30d': 30*86400000 };
  if (rangeAtual === 'all') return todos;
  const corte = now - cortes[rangeAtual];
  return todos.filter(c => new Date(c.created_at).getTime() >= corte);
}

function setRange(r) {
  rangeAtual = r;
  document.querySelectorAll('.filt-btn').forEach(b => b.classList.remove('on'));
  const map = { today:0, '7d':1, '30d':2, all:3 };
  document.querySelectorAll('.filt-btn')[map[r]]?.classList.add('on');
  renderDash();
}

function renderDash() {
  const data = filtrar();
  const total = data.length;
  const now = new Date();
  document.getElementById('dash-sub').textContent =
    `${total} registro${total!==1?'s':''} · Atualizado às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;

  // ── KPIs ──
  const finalizados  = data.filter(c => c.status === 'cadastrado').length;
  const revisao      = data.filter(c => c.status === 'revisao').length;
  const emAndamento  = data.filter(c => !['cadastrado','revisao'].includes(c.status)).length;
  const taxaConv     = total ? Math.round(finalizados/total*100) : 0;

  // Tempo médio (dias) para cadastrados
  const tempos = data.filter(c => c.status === 'cadastrado' && c.created_at && c.updated_at)
    .map(c => (new Date(c.updated_at) - new Date(c.created_at)) / 86400000);
  const tempoMedio = tempos.length ? (tempos.reduce((a,b)=>a+b,0)/tempos.length).toFixed(1) : '—';

  const credito = data.filter(c => c.tipo_solicitacao === 'atualizacao-credito').length;
  const semOrc  = data.filter(c => c.tipo_solicitacao === 'sem-orcamento').length;
  const padrao  = data.filter(c => !c.tipo_solicitacao || c.tipo_solicitacao === 'padrao').length;

  // ── Pipeline counts ──
  const pipeCount = {};
  PIPELINE_ORDER.forEach(s => pipeCount[s] = data.filter(c => c.status === s).length);
  const maxPipe = Math.max(...Object.values(pipeCount), 1);

  // ── Por equipe ──
  const equipeMap = {};
  data.forEach(c => {
    const eq = c.equipe || 'Sem equipe';
    if (!equipeMap[eq]) equipeMap[eq] = { total:0, fin:0, rev:0 };
    equipeMap[eq].total++;
    if (c.status === 'cadastrado') equipeMap[eq].fin++;
    if (c.status === 'revisao') equipeMap[eq].rev++;
  });
  const equipes = Object.entries(equipeMap).sort((a,b) => b[1].total - a[1].total);
  const maxEq = equipes[0]?.[1].total || 1;

  // ── Por vendedor ──
  const vendMap = {};
  data.forEach(c => {
    const v = c.vendedor_nome || 'Sem vendedor';
    if (!vendMap[v]) vendMap[v] = { total:0, fin:0, rev:0, equipe:c.equipe||'' };
    vendMap[v].total++;
    if (c.status === 'cadastrado') vendMap[v].fin++;
    if (c.status === 'revisao') vendMap[v].rev++;
  });
  const vendedores = Object.entries(vendMap).sort((a,b) => b[1].total - a[1].total).slice(0,12);

  // ── Por operador ──
  const opMap = {};
  data.forEach(c => {
    if (!c.operador_nome) return;
    if (!opMap[c.operador_nome]) opMap[c.operador_nome] = { total:0, fin:0 };
    opMap[c.operador_nome].total++;
    if (c.status === 'cadastrado') opMap[c.operador_nome].fin++;
  });
  const operadores = Object.entries(opMap).sort((a,b) => b[1].total - a[1].total);

  // ── Timeline (últimos 30 dias) ──
  const dias = {};
  const hoje = new Date(); hoje.setHours(23,59,59,999);
  for (let i=29; i>=0; i--) {
    const d = new Date(hoje); d.setDate(d.getDate()-i);
    dias[d.toISOString().slice(0,10)] = 0;
  }
  data.forEach(c => {
    const k = (c.created_at||'').slice(0,10);
    if (dias[k] !== undefined) dias[k]++;
  });
  const timelineKeys = Object.keys(dias);
  const timelineVals = Object.values(dias);
  const maxTL = Math.max(...timelineVals, 1);

  // ── Recentes ──
  const recentes = [...data].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,10);

  // ── Status donut ──
  const statusCounts = {};
  Object.keys(STATUS_CFG).forEach(s => statusCounts[s] = data.filter(c => c.status === s).length);

  document.getElementById('dash-content').innerHTML = `

  <!-- KPIs -->
  <div class="kpi-grid">
    ${kpi('Total de Cadastros', total, 'Todos os períodos', 'ti-clipboard-list', 'blue')}
    ${kpi('Finalizados', finalizados, `Taxa de ${taxaConv}%`, 'ti-circle-check', 'green')}
    ${kpi('Em Andamento', emAndamento, 'No pipeline', 'ti-clock', 'cyan')}
    ${kpi('Em Revisão', revisao, 'Precisam atenção', 'ti-alert-circle', 'red')}
    ${kpi('Tempo Médio', tempoMedio === '—' ? '—' : tempoMedio+'d', 'Até finalizar', 'ti-hourglass', 'yellow')}
    ${kpi('Taxa Conversão', taxaConv+'%', `${finalizados} de ${total}`, 'ti-trending-up', 'purple')}
  </div>

  <!-- Pipeline + Tipos -->
  <div class="sec-row col13">
    <div class="card">
      <div class="card-title"><i class="ti ti-filter"></i> Funil do Pipeline</div>
      <div class="funnel">
        ${PIPELINE_ORDER.map(s => {
          const cfg = STATUS_CFG[s];
          const n   = pipeCount[s];
          const pct = Math.round(n/maxPipe*100);
          return `<div class="funnel-step">
            <div class="funnel-label">${cfg.label}</div>
            <div class="funnel-bar-wrap">
              <div class="funnel-bar" style="width:${Math.max(pct,4)}%;background:${cfg.color}">${n > 0 ? n : ''}</div>
            </div>
            <div class="funnel-count">${n}</div>
          </div>`;
        }).join('')}
        ${revisao > 0 ? `<div class="funnel-step">
          <div class="funnel-label" style="color:#DC2626">Em Revisão</div>
          <div class="funnel-bar-wrap">
            <div class="funnel-bar" style="width:${Math.max(Math.round(revisao/maxPipe*100),4)}%;background:#DC2626">${revisao}</div>
          </div>
          <div class="funnel-count" style="color:#DC2626">${revisao}</div>
        </div>` : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-tag"></i> Tipo de Solicitação</div>
      <div class="tipo-grid" style="margin-bottom:16px">
        <div class="tipo-card" style="background:#EEF3FF;color:#1B3FAB">
          <div class="tipo-card-num">${padrao}</div>
          <div class="tipo-card-lbl">Padrão</div>
        </div>
        <div class="tipo-card" style="background:#FEF3C7;color:#D97706">
          <div class="tipo-card-num">${credito}</div>
          <div class="tipo-card-lbl">Ajuste de Crédito</div>
        </div>
        <div class="tipo-card" style="background:#F0FDF4;color:#16A34A">
          <div class="tipo-card-num">${semOrc}</div>
          <div class="tipo-card-lbl">Sem Orçamento</div>
        </div>
      </div>
      <div class="card-title" style="margin-top:4px"><i class="ti ti-chart-donut"></i> Distribuição por Status</div>
      ${donutChart(statusCounts)}
    </div>
  </div>

  <!-- Timeline -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><i class="ti ti-chart-line"></i> Cadastros por Dia — últimos 30 dias</div>
    <div class="timeline-wrap">${timelineSVG(timelineKeys, timelineVals, maxTL)}</div>
  </div>

  <!-- Por equipe + Vendedores -->
  <div class="sec-row col2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title"><i class="ti ti-users"></i> Performance por Equipe</div>
      <div class="bar-chart">
        ${equipes.map(([eq, d]) => {
          const teamCfg = TEAMS.find(t => t.name === eq) || {color:'#9CA3AF'};
          const pct = Math.round(d.total/maxEq*100);
          const conv = d.total ? Math.round(d.fin/d.total*100) : 0;
          return `<div class="bar-row">
            <div class="bar-name" title="${eq}">${eq}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${Math.max(pct,4)}%;background:${teamCfg.color}">${d.total}</div>
            </div>
            <div class="bar-num">${conv}%</div>
          </div>`;
        }).join('')}
        ${equipes.length === 0 ? '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">Sem dados</div>' : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-user-check"></i> Performance por Operador</div>
      ${operadores.length === 0
        ? '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px 0">Nenhum operador registrado</div>'
        : `<table class="rank-table">
          <thead><tr><th>Operador</th><th>Total</th><th>Finalizados</th><th>Conv.</th></tr></thead>
          <tbody>
          ${operadores.map(([op, d]) => {
            const ini = op.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
            const conv = d.total ? Math.round(d.fin/d.total*100) : 0;
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="rank-av" style="background:#1B3FAB">${ini}</div>
                <span class="rank-name">${op}</span>
              </div></td>
              <td><strong>${d.total}</strong></td>
              <td>${d.fin}</td>
              <td><span class="badge-sm" style="background:${conv>=50?'#DCFCE7':'#FEF3C7'};color:${conv>=50?'#166534':'#92400E'}">${conv}%</span></td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>`
      }
    </div>
  </div>

  <!-- Ranking de Vendedores -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><i class="ti ti-trophy"></i> Ranking de Vendedores</div>
    <table class="rank-table">
      <thead><tr>
        <th>#</th><th>Vendedor</th><th>Equipe</th>
        <th>Total</th><th>Finalizados</th><th>Em Revisão</th><th>Conversão</th><th>Progresso</th>
      </tr></thead>
      <tbody>
      ${vendedores.length === 0
        ? `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px">Sem dados no período</td></tr>`
        : vendedores.map(([v, d], i) => {
          const ini = v.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
          const teamCfg = TEAMS.find(t => t.name === d.equipe) || {color:'#9CA3AF', bg:'#F3F4F6'};
          const conv = d.total ? Math.round(d.fin/d.total*100) : 0;
          const maxVend = vendedores[0][1].total;
          const pct = Math.round(d.total/maxVend*100);
          return `<tr>
            <td style="font-weight:700;color:${i<3?['#D97706','#9CA3AF','#CD7F32'][i]:'var(--muted)'};font-size:13px">${i+1}</td>
            <td><div style="display:flex;align-items:center;gap:8px">
              <div class="rank-av" style="background:${teamCfg.color}">${ini}</div>
              <span class="rank-name">${v}</span>
            </div></td>
            <td><span class="badge-sm" style="background:${teamCfg.bg};color:${teamCfg.color}">${d.equipe||'—'}</span></td>
            <td><strong>${d.total}</strong></td>
            <td><span style="color:#16A34A;font-weight:700">${d.fin}</span></td>
            <td><span style="color:${d.rev>0?'#DC2626':'var(--muted)'};font-weight:${d.rev>0?700:400}">${d.rev}</span></td>
            <td><span class="badge-sm" style="background:${conv>=60?'#DCFCE7':conv>=30?'#FEF3C7':'#FEF2F2'};color:${conv>=60?'#166534':conv>=30?'#92400E':'#DC2626'}">${conv}%</span></td>
            <td style="min-width:100px">
              <div class="mini-bar-wrap"><div class="mini-bar" style="width:${pct}%;background:${teamCfg.color}"></div></div>
              <div style="font-size:9px;color:var(--muted);margin-top:2px">${d.total} cadastro${d.total!==1?'s':''}</div>
            </td>
          </tr>`;
        }).join('')
      }
      </tbody>
    </table>
  </div>

  <!-- Recentes -->
  <div class="card">
    <div class="card-title"><i class="ti ti-clock"></i> Últimos 10 Cadastros</div>
    <table class="recent-table">
      <thead><tr>
        <th>Cliente</th><th>CNPJ</th><th>Vendedor</th><th>Equipe</th><th>Tipo</th><th>Status</th><th>Data</th>
      </tr></thead>
      <tbody>
      ${recentes.map(c => {
        const cfg  = STATUS_CFG[c.status] || {label:c.status, color:'#9CA3AF', bg:'#F3F4F6'};
        const team = TEAMS.find(t => t.name === c.equipe) || {color:'#9CA3AF', bg:'#F3F4F6'};
        const d    = new Date(c.created_at||Date.now());
        const tipo = c.tipo_solicitacao === 'atualizacao-credito' ? '💳 Crédito'
                   : c.tipo_solicitacao === 'sem-orcamento' ? '📋 Sem Orc.'
                   : '✅ Padrão';
        return `<tr>
          <td><strong>${c.razao_social||c.responsavel||'—'}</strong></td>
          <td class="mono">${c.cnpj||'—'}</td>
          <td>${c.vendedor_nome||'—'}</td>
          <td><span class="badge-sm" style="background:${team.bg};color:${team.color}">${c.equipe||'—'}</span></td>
          <td style="font-size:11px">${tipo}</td>
          <td><span class="badge-sm" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</span></td>
          <td style="color:var(--muted);white-space:nowrap">${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</td>
        </tr>`;
      }).join('')}
      ${recentes.length === 0 ? '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">Sem cadastros no período</td></tr>' : ''}
      </tbody>
    </table>
  </div>`;
}

function kpi(label, val, sub, ico, color) {
  return `<div class="kpi ${color}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-val">${val}</div>
    <div class="kpi-sub">${sub}</div>
    <i class="ti ${ico} kpi-ico"></i>
  </div>`;
}

function donutChart(counts) {
  const entries = Object.entries(STATUS_CFG).map(([k,v]) => ({...v, n:counts[k]||0})).filter(e=>e.n>0);
  const total = entries.reduce((a,b)=>a+b.n,0) || 1;
  const R=52, cx=64, cy=64, stroke=18;
  let offset = 0;
  const circ = 2*Math.PI*R;
  const arcs = entries.map(e => {
    const pct = e.n/total;
    const dash = circ*pct;
    const arc  = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${e.color}" stroke-width="${stroke}"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" opacity=".9"/>`;
    offset += circ*pct;
    return arc;
  }).join('');
  return `<div class="donut-wrap">
    <svg width="128" height="128" viewBox="0 0 128 128" style="flex-shrink:0">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#F3F4F6" stroke-width="${stroke}"/>
      ${arcs}
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="800" fill="#111827">${total}</text>
    </svg>
    <div class="donut-legend">
      ${entries.map(e=>`<div class="legend-row">
        <div class="legend-dot" style="background:${e.color}"></div>
        <div class="legend-label">${e.label}</div>
        <div class="legend-val">${e.n}</div>
        <div class="legend-pct">${Math.round(e.n/total*100)}%</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function timelineSVG(keys, vals, maxVal) {
  const W=900, H=140, padL=30, padR=20, padT=10, padB=30;
  const n = keys.length;
  const xStep = (W-padL-padR)/(n-1||1);
  const yScale = v => padT + (H-padT-padB)*(1-v/maxVal);

  const pts = keys.map((k,i) => `${padL+i*xStep},${yScale(vals[i])}`).join(' ');
  const area = `${padL},${H-padB} `+pts+` ${padL+(n-1)*xStep},${H-padB}`;

  // Grid lines
  const gridLines = [0,.25,.5,.75,1].map(p => {
    const y = padT+(H-padT-padB)*(1-p);
    const v = Math.round(maxVal*p);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#EAF0FB" stroke-width="1"/>
      <text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#C4D0E8">${v}</text>`;
  }).join('');

  // X labels (every 5 days)
  const xLabels = keys.map((k,i) => {
    if (i % 5 !== 0 && i !== n-1) return '';
    const d = new Date(k+'T12:00:00');
    const lbl = `${d.getDate()}/${d.getMonth()+1}`;
    return `<text x="${padL+i*xStep}" y="${H-padB+14}" text-anchor="middle" font-size="9" fill="#C4D0E8">${lbl}</text>`;
  }).join('');

  // Dots for non-zero
  const dots = keys.map((k,i) => vals[i]>0
    ? `<circle cx="${padL+i*xStep}" cy="${yScale(vals[i])}" r="3" fill="#1B3FAB"/>
       <title>${k}: ${vals[i]}</title>` : '').join('');

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="min-width:${W}px">
    ${gridLines}
    <polygon points="${area}" fill="#EEF3FF" opacity=".5"/>
    <polyline points="${pts}" fill="none" stroke="#1B3FAB" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

carregar();
// Auto-refresh a cada 2 minutos
setInterval(carregar, 120000);
</script>
</body>
